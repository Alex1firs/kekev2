name: keke_driver
description: "Keke App v2 - Driver Application"
publish_to: 'none'
version: 1.0.8+22


environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.2
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  audioplayers: ^6.1.0
  google_maps_flutter: ^2.5.3
  geolocator: ^11.1.0
  geocoding: ^3.0.0
  socket_io_client: ^3.0.0
  image_picker: ^1.1.2
  path: ^1.9.1
  jwt_decoder: ^2.0.1
  url_launcher: ^6.3.0
  webview_flutter: ^4.10.0
  google_fonts: ^6.2.1
  flutter_foreground_task: ^8.14.0
  # Background-reliability hardening:
  device_info_plus: ^10.1.0        # OEM/manufacturer + Android SDK detection
  package_info_plus: ^8.0.0        # app version/build for heartbeat + diagnostics
  connectivity_plus: ^6.0.0        # network status for diagnostics
  flutter_local_notifications: ^17.2.2  # locked-screen ride-request ring
  android_intent_plus: ^5.1.0      # OEM auto-start / protected-app settings intents

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/keke_ring.wav
    - assets/images/keke_marker.jpg
    - assets/images/app_logo.png
    - assets/images/splash_bg.png

dependency_overrides:
  objective_c: ^8.1.0
  path_provider_foundation: 2.5.1
