workflows:
  keke-driver-ios:
    name: Keke Driver — iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: 26.4
      flutter: stable
      groups:
        - ios_credentials

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'driver-v*'
          include: true

    scripts:
      - name: Set up keychain and certificate
        script: |
          keychain initialize
          python3 -c "import base64,os; open('/tmp/dist.p12','wb').write(base64.b64decode(os.environ['CM_CERTIFICATE']))"
          keychain add-certificates --certificate /tmp/dist.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"

      - name: Set up provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          python3 -c "import base64,os; open(os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles/KekeRideDriver_AppStore.mobileprovision'),'wb').write(base64.b64decode(os.environ['CM_PROVISIONING_PROFILE']))"

      - name: Get Flutter packages
        script: |
          cd apps/keke_driver
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd apps/keke_driver/ios
          pod install

      - name: Set up Xcode code signing
        script: |
          xcode-project use-profiles \
            --project apps/keke_driver/ios/Runner.xcodeproj

      - name: Build IPA
        script: |
          cd apps/keke_driver
          flutter build ipa --release \
            --build-number=$((BUILD_NUMBER + 100)) \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - apps/keke_driver/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
