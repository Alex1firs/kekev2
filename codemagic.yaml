workflows:
  keke-driver-ios:
    name: Keke Driver — iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: 26.4
      flutter: stable
      groups:
        - ios_credentials

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'driver-v*'
          include: true

    scripts:
      - name: Set up keychain and certificate
        script: |
          keychain initialize
          python3 -c "
import base64, os, sys
cert = os.environ.get('CM_CERTIFICATE', '')
if not cert:
    print('ERROR: CM_CERTIFICATE is empty'); sys.exit(1)
open('/tmp/dist.p12', 'wb').write(base64.b64decode(cert))
print('Certificate decoded OK')
"
          keychain add-certificates --certificate /tmp/dist.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"

      - name: Set up provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          python3 -c "
import base64, os, sys
profile = os.environ.get('CM_PROVISIONING_PROFILE', '')
if not profile:
    print('ERROR: CM_PROVISIONING_PROFILE is empty'); sys.exit(1)
profiles_home = os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles')
open(profiles_home + '/KekeRideDriver_AppStore.mobileprovision', 'wb').write(base64.b64decode(profile))
print('Profile decoded OK')
"

      - name: Get Flutter packages
        script: |
          cd apps/keke_driver
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd apps/keke_driver/ios
          pod install

      - name: Build iOS release
        script: |
          cd apps/keke_driver
          flutter build ios --release --no-codesign

      - name: Package and sign IPA
        script: |
          cd apps/keke_driver
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner \
            --config Release

    artifacts:
      - apps/keke_driver/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
