name: keke_passenger
description: "Keke App v2 - Passenger Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.2
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  audioplayers: ^6.1.0
  google_maps_flutter: ^2.5.3
  geolocator: ^11.1.0
  geocoding: ^3.0.0
  socket_io_client: ^3.0.0
  webview_flutter: ^4.10.0
  jwt_decoder: ^2.0.1
  url_launcher: ^6.3.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/keke_ring.wav
