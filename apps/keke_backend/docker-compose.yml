services:
  postgres_shared:
    image: postgis/postgis:15-3.3
    restart: always
    mem_limit: 250m
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_shared:
    image: redis:7-alpine
    restart: always
    mem_limit: 60m
    command: ["redis-server", "--maxmemory", "50mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api_prod:
    build: .
    restart: always
    mem_limit: 250m
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres_shared:5432/keke_prod_db
      REDIS_URL: redis://redis_shared:6379/0
      NODE_OPTIONS: "--max-old-space-size=200"
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      RATE_LIMIT_WINDOW: 900000
      ADMIN_RATE_LIMIT_MAX: 100
      ONBOARDING_RATE_LIMIT_MAX: 5
    depends_on:
      postgres_shared:
        condition: service_healthy
      redis_shared:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:4000/health"]
      interval: 20s
      timeout: 10s
      retries: 3

  api_staging:
    build: .
    restart: always
    mem_limit: 270m
    environment:
      NODE_ENV: staging
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres_shared:5432/keke_staging_db
      REDIS_URL: redis://redis_shared:6379/1
      NODE_OPTIONS: "--max-old-space-size=220"
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      RATE_LIMIT_WINDOW: 900000
      ADMIN_RATE_LIMIT_MAX: 100
      ONBOARDING_RATE_LIMIT_MAX: 5
    depends_on:
      postgres_shared:
        condition: service_healthy
      redis_shared:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx_gateway:
    image: nginx:alpine
    restart: always
    mem_limit: 50m
    volumes:
      - /opt/kekev2/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/kekev2/htpasswd:/etc/nginx/.htpasswd:ro
      - /opt/kekev2/apps/keke_admin:/usr/share/nginx/html/admin:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api_prod
      - api_staging

  adminer:
    image: adminer
    restart: always
    mem_limit: 60m
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres_shared:
        condition: service_healthy

volumes:
  pgdata:
